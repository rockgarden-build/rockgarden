name: Bump Version

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Explicit version to bump to (e.g., 0.4.0). Leave empty for automatic bump based on commits.'
        required: false
        type: string

jobs:
  bump:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history needed for commitizen
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump version (explicit)
        if: ${{ inputs.version != '' }}
        env:
          VERSION: ${{ inputs.version }}
        run: uv run cz bump --yes --increment CUSTOM --version "$VERSION"

      - name: Bump version (automatic)
        if: ${{ inputs.version == '' }}
        run: uv run cz bump --yes

      - name: Push changes
        run: |
          git push
          git push --tags
