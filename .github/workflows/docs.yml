name: Docs Site

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  deployments: write
  pull-requests: write

env:
  CLOUDFLARE_PROJECT_NAME: rockgarden

jobs:
  build-and-deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install rockgarden
        run: pip install .

      - name: Build site
        run: rockgarden build --source docs/ --output _site/ --clean

      - name: Deploy to Cloudflare Pages
        id: deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_PAGES_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy _site/ --project-name=${{ env.CLOUDFLARE_PROJECT_NAME }}
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}

      - name: Comment preview URL on PR
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          URL: ${{ steps.deploy.outputs.deployment-url }}
          PR_NUMBER: ${{ github.event.number }}
        run: |
          gh pr comment "$PR_NUMBER" --edit-last --body "**Docs Site** preview: $URL" \
            || gh pr comment "$PR_NUMBER" --body "**Docs Site** preview: $URL"
