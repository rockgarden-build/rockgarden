<!DOCTYPE html>
<html lang="en" data-theme="{{ site.daisyui_theme }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{{ page.title }}{% if site.title %} - {{ site.title }}{% endif %}{% endblock %}</title>
    {% include "components/meta.html" %}
    <link href="{{ site.base_path }}/{{ site.assets_dir }}/rockgarden.css{% if site.cache_hash %}?v={{ site.cache_hash }}{% endif %}" rel="stylesheet" type="text/css" />
    <link href="{{ site.base_path }}/{{ site.assets_dir }}/highlight.css{% if site.cache_hash %}?v={{ site.cache_hash }}{% endif %}" rel="stylesheet" type="text/css" />
    {% if site.search_enabled %}
    <script src="{{ site.base_path }}/{{ site.assets_dir }}/lunr.min.js{% if site.cache_hash %}?v={{ site.cache_hash }}{% endif %}"></script>
    {% endif %}
    {% for style in site.user_styles %}
    <link rel="stylesheet" href="{{ site.base_path }}/styles/{{ style }}" />
    {% endfor %}
    {% if site.feed_enabled %}
    <link rel="alternate" type="application/atom+xml" title="{{ site.title }}" href="{{ site.base_url }}{{ site.base_path }}{{ site.feed_path }}">
    {% endif %}
    {% if site.math_cdn %}
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.21/dist/katex.min.css" integrity="sha384-zh0CIslj3dQfnsgJHJmLpMPWwXhmG0hPmA5Z0LMKwUSHRy5kMaIzeCVMRJCGEa8" crossorigin="anonymous">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.21/dist/katex.min.js" integrity="sha384-Rma6DA2IPUwhNxmrB/7S3Tno0YY7sFu/FRVo3cXjMIQ1bf9N10ys2GkOBIQFRIF" crossorigin="anonymous"
        onload="document.querySelectorAll('.math').forEach(function(el){katex.render(el.textContent,el,{displayMode:el.classList.contains('block'),throwOnError:false})})"></script>
    {% endif %}
    {% block head %}{% endblock %}
    <script>
        (function() {
            const defaultTheme = '{{ site.daisyui_theme }}';
            const theme = localStorage.getItem('theme') || defaultTheme;
            document.documentElement.setAttribute('data-theme', theme);
        })();
    </script>
</head>
<body class="min-h-screen bg-base-100">
    {% block layout_body %}{% endblock %}
</body>
</html>
