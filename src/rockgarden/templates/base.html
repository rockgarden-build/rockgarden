<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{{ page.title }}{% if site.title %} - {{ site.title }}{% endif %}{% endblock %}</title>
    <style>
        :root {
            --max-width: 48rem;
            --spacing: 1.5rem;
            --font-body: system-ui, -apple-system, sans-serif;
            --font-mono: ui-monospace, monospace;
            --color-bg: #faf8f8;
            --color-text: #2b2b2b;
            --color-muted: #646464;
            --color-link: #284b63;
            --color-border: #e5e5e5;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: var(--font-body);
            font-size: 1rem;
            line-height: 1.6;
            color: var(--color-text);
            background: var(--color-bg);
            padding: var(--spacing);
        }
        main {
            max-width: var(--max-width);
            margin: 0 auto;
        }
        a { color: var(--color-link); }
        h1, h2, h3, h4, h5, h6 {
            margin-top: 1.5em;
            margin-bottom: 0.5em;
            line-height: 1.3;
        }
        h1 { font-size: 2rem; margin-top: 0; }
        h2 { font-size: 1.5rem; }
        h3 { font-size: 1.25rem; }
        p, ul, ol, pre, blockquote { margin-bottom: 1em; }
        ul, ol { padding-left: 1.5em; }
        pre, code {
            font-family: var(--font-mono);
            font-size: 0.9em;
            background: var(--color-border);
            border-radius: 4px;
        }
        code { padding: 0.1em 0.3em; }
        pre { padding: 1em; overflow-x: auto; }
        pre code { padding: 0; background: none; }
        blockquote {
            border-left: 3px solid var(--color-border);
            padding-left: 1em;
            color: var(--color-muted);
        }
        hr { border: none; border-top: 1px solid var(--color-border); margin: 2em 0; }
        img { max-width: 100%; height: auto; }

        /* Layout with sidebar */
        .site-layout {
            display: flex;
            gap: 2rem;
            max-width: 72rem;
            margin: 0 auto;
        }
        .site-nav {
            flex-shrink: 0;
            width: 14rem;
            position: sticky;
            top: var(--spacing);
            align-self: flex-start;
            max-height: calc(100vh - 2 * var(--spacing));
            overflow-y: auto;
        }
        .site-content {
            flex: 1;
            min-width: 0;
            max-width: var(--max-width);
        }

        /* Nav styling */
        .site-nav ul {
            list-style: none;
            padding-left: 0;
            margin: 0;
        }
        .site-nav ul ul {
            padding-left: 1rem;
        }
        .site-nav li {
            margin: 0.25rem 0;
        }
        .site-nav a {
            text-decoration: none;
            color: var(--color-text);
        }
        .site-nav a:hover {
            color: var(--color-link);
        }
        .site-nav details > summary {
            cursor: pointer;
            list-style: none;
        }
        .site-nav details > summary::-webkit-details-marker {
            display: none;
        }
        .site-nav details > summary::before {
            content: "▸ ";
            font-size: 0.75em;
            color: var(--color-muted);
        }
        .site-nav details[open] > summary::before {
            content: "▾ ";
        }

        /* Responsive: hide nav on small screens */
        @media (max-width: 768px) {
            .site-layout {
                flex-direction: column;
            }
            .site-nav {
                width: 100%;
                position: static;
                max-height: none;
                border-bottom: 1px solid var(--color-border);
                padding-bottom: 1rem;
                margin-bottom: 1rem;
            }
        }
    </style>
    {% block head %}{% endblock %}
</head>
<body>
    <div class="site-layout">
        {% if site.nav and site.nav.children %}
        {% include "components/nav.html" %}
        {% endif %}
        <main class="site-content">
            {% block content %}{% endblock %}
        </main>
    </div>
    {% block footer %}{% endblock %}
</body>
</html>
