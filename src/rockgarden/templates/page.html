{% extends "base.html" %}

{% block content %}
<div class="flex gap-8">
    <!-- Main content -->
    <div class="flex-1 min-w-0">
        {% if breadcrumbs and breadcrumbs|length > 1 %}
        {% include "components/breadcrumbs.html" %}
        {% endif %}
        <article class="prose prose-base max-w-none leading-tight prose-headings:scroll-mt-20 prose-a:text-primary prose-code:before:content-none prose-code:after:content-none">
            <h1>{{ page.title }}</h1>
            {{ page.html | safe }}
        </article>
    </div>

    <!-- Right sidebar (desktop only) -->
    <aside class="hidden xl:block w-64 flex-shrink-0">
        {% if backlinks %}
        {% include "components/backlinks.html" %}
        {% endif %}
    </aside>
</div>
{% endblock %}
