<nav class="breadcrumbs" aria-label="Breadcrumb">
  <ol>
    {% for crumb in breadcrumbs %}
    <li>
      {% if not loop.last %}
      <a href="{{ crumb.path }}">{{ crumb.label }}</a>
      <span class="separator" aria-hidden="true">/</span>
      {% else %}
      <span aria-current="page">{{ crumb.label }}</span>
      {% endif %}
    </li>
    {% endfor %}
  </ol>
</nav>
